<!DOCTYPE html>
<!-- DOM: Document object model // a programming interface for HTML and XML documents. It represents the page so that programs can change the document structure, style, and content. The DOM represents the document as nodes and objects; that way, programming languages can interact with the page. -->
<!-- A web page is a document. This document can be either displayed in the browser window or as the HTML source. 
<!-- But it is the same document in both cases. The DOM represents that document as a tree of objects; each object corresponds to a part of the document. For example, an element in HTML (like <div>, <p>, etc.) is represented as an object in the DOM. This allows developers to manipulate the content and structure of a web page dynamically using JavaScript or other programming languages that can interact with the DOM. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Restaurant-011> </title>
</head>
<body> 
    <div>
    <h1>Welcome to Restaurant-011</h1>
    <p>Experience the finest dining with us!</p>
    </div>

</body>

</html>
