<!DOCTYPE html>
<html lang="en">
<body style="text-align: center;">
<h3>Select your favorite dish:</h3>

<input type="radio" id="tibs" name="dish" value="Tibs">
<!-- // expplain each part of this line
- `<input>`: This is an HTML element that creates an interactive control in a web form that users can use to enter data. In this case, it creates a radio button.
- `type="radio"`: This attribute specifies that the input element is a radio button, which allows users to select one option from a set of choices.
- `id="tibs"`: This attribute assigns a unique identifier to the radio button, which can be used to reference it in CSS or JavaScript, and also to associate it with a label.
- `name="dish"`: This attribute groups the radio buttons together. All radio buttons with the same name belong to the same group, allowing only one of them to be selected at a time.
- `value="Tibs"`: This attribute specifies the value that will be submitted with the form when this radio button is selected. In this case, if the user selects this option, "Tibs" will be sent as the value for the "dish" field in the form submission.          
*/ -->

<label for="tibs">ጥብስ</label><br> <br>

<input type="radio" id="kitfo" name="dish" value="Kitfo">
<label for="kitfo">ክትፎ</label><br> <br>

<input type="radio" id="shiro" name="dish" value="Shiro">
<label for="shiro">ሽሮ</label>
</body>
</html>
